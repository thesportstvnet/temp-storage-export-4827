name: Update

on:
  # Run automatically every 10 minutes
  schedule:
    - cron: '*/10 * * * *'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false   # we'll use the default GITHUB_TOKEN later

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Sportzx client
        run: python testt.py
        env:
          OUTPUT_FILE: "output.json"
          # Optional: set categories to exclude
          # SPORTZX_EXCLUDED_CATEGORIES: '["adult","test"]'
          # SPORTZX_TIMEOUT: "15"

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update streams (every 10 min)"
          file_pattern: "output.json"
          commit_user_name: "GitHub Action"
          commit_user_email: "action@github.com"
