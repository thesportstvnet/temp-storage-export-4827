name: Update

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Sportzx client
        run: python testt.py
        env:
          OUTPUT_FILE: "output.json"
          # optional: SPORTZX_EXCLUDED_CATEGORIES: '["adult","test"]'

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add output.json
          git diff --cached --quiet || git commit -m "Auto-update streams (every 10 min)"
          git push
